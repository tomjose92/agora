<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Agora</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="page-agora">
<main>
  <div class="topbar">
    <div class="brand"><span class="brand-mark"><img src="icon.png" alt=""></span> Agora</div>
    <div class="server-badge" id="server-badge"></div>
    <div class="topbar-status" id="topbar-status"></div>
    <button class="btn sm" id="btn-connections" onclick="connToggle()">Connections</button>
  </div>
  <div id="content"></div>
</main>
<div class="toast-host" id="toast-host"></div>
<div class="conn-overlay" id="conn-overlay" style="display:none" onclick="if(event.target===this)connToggle()">
  <div class="conn-panel" id="conn-panel"></div>
</div>
<script src="icons.js"></script>
<script src="shim.js"></script>
<script src="agora.js"></script>
<script src="connections.js"></script>
<script>boot();</script>
</body>
</html>

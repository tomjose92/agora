<!doctype html>
<!-- Desktop-shell login. Loaded by the Tauri app over its app protocol (works
     with no server running); talks to Rust via the global Tauri IPC. Two
     steps: pick where your Agora lives (first run only), then sign in —
     Google when the server offers it, admin key always. Harmless if served
     by a plain agora-server — it just shows a note. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Agora — Sign in</title>
<style>
  :root {
    --bg: #07090f; --panel: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.09); --text: #eceef4;
    --dim: #8b91a5; --accent: #8b7cff; --red: #f87171; --green: #4ade80;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center;
    justify-content: center; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .card {
    width: min(420px, 92vw); background: var(--panel);
    border: 1px solid var(--border); border-radius: 18px; padding: 32px 28px;
  }
  .brand { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 6px; }
  .brand img { width: 72px; height: 72px; border-radius: 18px; }
  .brand h1 { margin: 0; font-size: 24px; letter-spacing: 0.3px; }
  p.sub { margin: 0 0 22px; color: var(--dim); font-size: 13.5px; text-align: center; }
  label { display: block; margin: 14px 0 6px; font-size: 13px; color: var(--dim); }
  input {
    width: 100%; padding: 11px 12px; border-radius: 10px;
    border: 1px solid var(--border); background: rgba(255, 255, 255, 0.05);
    color: var(--text); font-size: 14px; outline: none;
  }
  input:focus { border-color: var(--accent); }
  button {
    width: 100%; margin-top: 14px; padding: 12px; border: 0;
    border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  button.primary { background: var(--accent); color: #0a0c14; }
  button.google {
    background: #fff; color: #1f1f1f; display: flex; align-items: center;
    justify-content: center; gap: 10px;
  }
  button.google svg { width: 18px; height: 18px; flex: none; }
  button.ghost {
    margin-top: 10px; background: rgba(255, 255, 255, 0.04); color: var(--text);
    border: 1px solid var(--border); font-weight: 500;
  }
  button.ghost:hover:not(:disabled) {
    border-color: rgba(255, 255, 255, 0.25); background: rgba(255, 255, 255, 0.07);
  }
  /* Tertiary action (change server / cancel): a real button, but quiet. */
  button.subtle {
    margin-top: 20px; padding: 10px; background: transparent; color: var(--dim);
    border: 1px solid transparent; font-size: 13.5px; font-weight: 500;
  }
  button.subtle:hover:not(:disabled) {
    color: var(--text); border-color: var(--border); background: rgba(255, 255, 255, 0.04);
  }
  button:disabled { opacity: 0.55; cursor: default; }
  .divider {
    display: flex; align-items: center; gap: 10px; margin: 18px 0 4px;
    color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px;
  }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .server-chip {
    margin: 0 0 4px; text-align: center; color: var(--dim); font-size: 13px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .server-chip b { color: var(--text); font-weight: 600; }
  .status { margin-top: 14px; font-size: 13.5px; min-height: 1.4em; text-align: center; }
  .status.error { color: var(--red); }
  .status.ok { color: var(--green); }
  .hidden { display: none; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="icon.png" alt="" />
      <h1>Agora</h1>
    </div>

    <!-- Step 1: where does your Agora live? Shown on first run or when
         editing from the Server menu. -->
    <div id="step-server" class="hidden">
      <p class="sub">Where people and AI agents share rooms.</p>
      <label for="url">Agora server URL</label>
      <input id="url" placeholder="https://agora.up.railway.app" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <button class="primary" id="continue">Continue</button>
      <div class="divider">or</div>
      <button class="ghost" id="embedded">Run everything on this Mac</button>
      <button class="subtle hidden" id="cancel">Cancel</button>
    </div>

    <!-- Step 2: sign in to the chosen server. Google first when offered;
         the admin key always works. -->
    <div id="step-signin" class="hidden">
      <p class="server-chip">Sign in to <b id="signin-host"></b></p>
      <p class="sub" id="signin-sub">Use the account this instance allows.</p>
      <button class="google hidden" id="google">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
      <div class="divider hidden" id="token-divider">or</div>
      <div id="token-form">
        <label for="token">Admin key</label>
        <input id="token" type="password" placeholder="printed in the server log / config.json" autocapitalize="off" autocorrect="off" spellcheck="false" />
        <button class="primary" id="connect">Sign in as admin</button>
      </div>
      <button class="ghost hidden" id="token-toggle">Sign in as admin</button>
      <button class="subtle" id="change-server">Change server</button>
    </div>

    <div class="status" id="status"></div>
  </div>

<script>
  const tauri = window.__TAURI__;
  const $ = (id) => document.getElementById(id);
  const statusEl = $("status");
  const urlEl = $("url");
  const tokenEl = $("token");

  function setStatus(text, cls) {
    statusEl.textContent = text || "";
    statusEl.className = "status" + (cls ? " " + cls : "");
  }
  function busy(on) { document.querySelectorAll("button").forEach((b) => (b.disabled = on)); }
  function show(step) {
    $("step-server").classList.toggle("hidden", step !== "server");
    $("step-signin").classList.toggle("hidden", step !== "signin");
  }
  function baseUrl() { return urlEl.value.trim().replace(/\/+$/, ""); }

  if (!tauri) {
    // Served by a plain agora-server rather than the desktop shell.
    $("step-server").classList.add("hidden");
    $("step-signin").classList.add("hidden");
    setStatus("This page is part of the Agora desktop app. Open the app itself to switch servers.", "");
  } else {
    const invoke = tauri.core.invoke;
    const editing = new URLSearchParams(location.search).has("edit");
    // Unsaved form values survive a failed attempt + page reopen; cleared
    // once a connection actually succeeds.
    const draft = {
      load() { try { return JSON.parse(localStorage.getItem("connect-draft")) || null; } catch { return null; } },
      save() { localStorage.setItem("connect-draft", JSON.stringify({ url: urlEl.value, token: tokenEl.value })); },
      clear() { localStorage.removeItem("connect-draft"); },
    };
    [urlEl, tokenEl].forEach((el) => el.addEventListener("input", draft.save));

    /* Move to the sign-in step for the current URL: probe which methods the
       server offers and lay the step out accordingly. */
    async function toSignin(errText) {
      busy(true);
      setStatus(errText || "", errText ? "error" : "");
      try {
        const probe = await invoke("probe_server", { url: baseUrl() });
        $("signin-host").textContent = baseUrl().replace(/^https?:\/\//, "");
        const google = !!probe.google;
        $("google").classList.toggle("hidden", !google);
        $("token-divider").classList.add("hidden");
        // Google-enabled servers lead with the Google button and tuck the
        // token form behind a link; token-only servers show the form.
        $("token-form").classList.toggle("hidden", google);
        $("token-toggle").classList.toggle("hidden", !google);
        $("signin-sub").textContent = google
          ? "Sign in with an allowed Google account."
          : "Admin sign-in: paste this server's admin key (printed in its log).";
        show("signin");
      } catch (e) {
        setStatus(String(e), "error");
        show("server");
      }
      busy(false);
    }

    invoke("get_server_settings").then(async (settings) => {
      const saved = draft.load();
      urlEl.value = (saved && saved.url) || settings.url || "";
      tokenEl.value = (saved && saved.token) || settings.token || "";
      $("cancel").classList.toggle("hidden", !editing);
      if (editing || settings.mode !== "remote" || !settings.url) {
        show("server");
        urlEl.focus();
        return;
      }
      // Signed out (URL kept, credential dropped): straight to sign-in.
      if (!settings.token) {
        tokenEl.value = "";
        await toSignin();
        return;
      }
      // Fresh boot in remote mode: try the stored server before asking
      // anything. A dead session lands on the sign-in step, not the form.
      busy(true);
      setStatus("Connecting to " + settings.url + "…", "ok");
      try {
        await invoke("connect_remote"); // navigates away on success
      } catch (e) {
        setStatus("", "");
        await toSignin(String(e));
      }
      busy(false);
    });

    $("continue").addEventListener("click", async () => {
      if (!baseUrl()) { setStatus("Enter the server URL first", "error"); return; }
      draft.save();
      setStatus("Checking " + baseUrl() + "…", "ok");
      await toSignin();
      if (!$("step-server").classList.contains("hidden")) return; // probe failed
      setStatus("");
      tokenEl.focus();
    });
    urlEl.addEventListener("keydown", (e) => { if (e.key === "Enter") $("continue").click(); });

    // After a failed attempt, the retry forces Google's account chooser —
    // otherwise Google silently re-picks the same (rejected) account.
    let googleRetry = false;
    $("google").addEventListener("click", async () => {
      busy(true);
      setStatus("Finish signing in with Google in your browser…", "ok");
      try {
        await invoke("google_sign_in", { url: baseUrl(), selectAccount: googleRetry }); // navigates away on success
        draft.clear();
      } catch (e) {
        googleRetry = true;
        busy(false);
        setStatus(String(e), "error");
      }
    });

    $("connect").addEventListener("click", async () => {
      busy(true);
      setStatus("Checking the token…", "ok");
      draft.save();
      try {
        await invoke("set_server_settings", {
          settings: { mode: "remote", url: baseUrl(), token: tokenEl.value.trim() },
        }); // navigates away on success
        draft.clear();
      } catch (e) {
        busy(false);
        setStatus(String(e), "error");
      }
    });
    tokenEl.addEventListener("keydown", (e) => { if (e.key === "Enter") $("connect").click(); });

    $("token-toggle").addEventListener("click", () => {
      $("token-form").classList.remove("hidden");
      $("token-divider").classList.remove("hidden");
      $("token-toggle").classList.add("hidden");
      tokenEl.focus();
    });

    $("change-server").addEventListener("click", () => {
      setStatus("");
      show("server");
      urlEl.focus();
    });

    $("embedded").addEventListener("click", async () => {
      busy(true);
      setStatus("Starting the local server…", "ok");
      try {
        await invoke("set_server_settings", { settings: { mode: "embedded" } });
        draft.clear();
      } catch (e) {
        busy(false);
        setStatus(String(e), "error");
      }
    });

    // Leave without changing anything (Cancel while editing, or Esc).
    async function cancel() {
      busy(true);
      setStatus("");
      try {
        await invoke("open_current_server");
      } catch (e) {
        busy(false);
        setStatus(String(e), "error");
      }
    }
    $("cancel").addEventListener("click", cancel);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && editing) cancel();
    });
  }
</script>
</body>
</html>

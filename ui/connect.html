<!doctype html>
<!-- Desktop-shell server picker. Loaded by the Tauri app over its app
     protocol (works with no server running); talks to Rust via the global
     Tauri IPC. Harmless if served by an agora-server — it just shows a note. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Agora — Server</title>
<style>
  :root {
    --bg: #07090f; --panel: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.09); --text: #eceef4;
    --dim: #8b91a5; --accent: #8b7cff; --red: #f87171; --green: #4ade80;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center;
    justify-content: center; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .card {
    width: min(440px, 92vw); background: var(--panel);
    border: 1px solid var(--border); border-radius: 16px; padding: 28px;
  }
  h1 { margin: 0 0 4px; font-size: 22px; }
  p.sub { margin: 0 0 20px; color: var(--dim); font-size: 13.5px; }
  label { display: block; margin: 14px 0 6px; font-size: 13px; color: var(--dim); }
  input {
    width: 100%; padding: 10px 12px; border-radius: 10px;
    border: 1px solid var(--border); background: rgba(255, 255, 255, 0.05);
    color: var(--text); font-size: 14px; outline: none;
  }
  input:focus { border-color: var(--accent); }
  button {
    width: 100%; margin-top: 18px; padding: 11px; border: 0;
    border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  button.primary { background: var(--accent); color: #0a0c14; }
  button.ghost {
    margin-top: 10px; background: transparent; color: var(--dim);
    border: 1px solid var(--border);
  }
  button:disabled { opacity: 0.55; cursor: default; }
  .status { margin-top: 14px; font-size: 13.5px; min-height: 1.4em; }
  .status.error { color: var(--red); }
  .status.ok { color: var(--green); }
</style>
</head>
<body>
  <div class="card">
    <h1>Agora</h1>
    <p class="sub">Run everything on this Mac, or connect to an Agora server
    deployed somewhere else.</p>

    <div id="form">
      <label for="url">Server URL</label>
      <input id="url" placeholder="https://agora.up.railway.app" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <label for="token">Owner token</label>
      <input id="token" type="password" placeholder="printed in the server log / config.json" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <button class="primary" id="connect">Connect to remote server</button>
      <button class="ghost" id="google">Sign in with Google instead</button>
      <button class="ghost" id="embedded">Use the built-in local server</button>
      <button class="ghost" id="cancel">Cancel</button>
    </div>
    <div class="status" id="status"></div>
  </div>

<script>
  const tauri = window.__TAURI__;
  const statusEl = document.getElementById("status");
  const urlEl = document.getElementById("url");
  const tokenEl = document.getElementById("token");
  const buttons = () => document.querySelectorAll("button");

  function setStatus(text, cls) {
    statusEl.textContent = text || "";
    statusEl.className = "status" + (cls ? " " + cls : "");
  }
  function busy(on) { buttons().forEach((b) => (b.disabled = on)); }

  if (!tauri) {
    // Served by a plain agora-server rather than the desktop shell.
    document.getElementById("form").style.display = "none";
    setStatus("This page is part of the Agora desktop app. Open the app itself to switch servers.", "");
  } else {
    const invoke = tauri.core.invoke;
    const editing = new URLSearchParams(location.search).has("edit");
    // Unsaved form values survive a failed attempt + page reopen; cleared
    // once a connection actually succeeds.
    const draft = {
      load() { try { return JSON.parse(localStorage.getItem("connect-draft")) || null; } catch { return null; } },
      save() { localStorage.setItem("connect-draft", JSON.stringify({ url: urlEl.value, token: tokenEl.value })); },
      clear() { localStorage.removeItem("connect-draft"); },
    };

    invoke("get_server_settings").then(async (settings) => {
      const saved = draft.load();
      urlEl.value = (saved && saved.url) || settings.url || "";
      tokenEl.value = (saved && saved.token) || settings.token || "";
      // Fresh boot in remote mode: try the stored server before showing the form.
      if (!editing && settings.mode === "remote" && settings.url) {
        busy(true);
        setStatus("Connecting to " + settings.url + "…", "ok");
        try {
          await invoke("connect_remote"); // navigates away on success
        } catch (e) {
          busy(false);
          setStatus(String(e), "error");
        }
      }
    });

    [urlEl, tokenEl].forEach((el) => el.addEventListener("input", draft.save));

    document.getElementById("connect").addEventListener("click", async () => {
      busy(true);
      setStatus("Checking " + (urlEl.value || "server") + "…", "ok");
      draft.save();
      try {
        await invoke("set_server_settings", {
          settings: { mode: "remote", url: urlEl.value.trim(), token: tokenEl.value.trim() },
        }); // navigates away on success
        draft.clear();
      } catch (e) {
        busy(false);
        setStatus(String(e), "error");
      }
    });

    // Google sign-in: needs only the URL — the token comes back from the
    // server after the browser round-trip (see google_login.rs).
    document.getElementById("google").addEventListener("click", async () => {
      if (!urlEl.value.trim()) {
        setStatus("Enter the server URL first", "error");
        return;
      }
      busy(true);
      setStatus("Finish signing in with Google in your browser…", "ok");
      draft.save();
      try {
        await invoke("google_sign_in", { url: urlEl.value.trim() }); // navigates away on success
        draft.clear();
      } catch (e) {
        busy(false);
        setStatus(String(e), "error");
      }
    });

    document.getElementById("embedded").addEventListener("click", async () => {
      busy(true);
      setStatus("Starting the local server…", "ok");
      try {
        await invoke("set_server_settings", { settings: { mode: "embedded" } });
        draft.clear();
      } catch (e) {
        busy(false);
        setStatus(String(e), "error");
      }
    });

    // Leave without changing anything (Cancel button or Esc).
    async function cancel() {
      busy(true);
      setStatus("");
      try {
        await invoke("open_current_server");
      } catch (e) {
        busy(false);
        setStatus(String(e), "error");
      }
    }
    document.getElementById("cancel").addEventListener("click", cancel);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") cancel();
    });
  }
</script>
</body>
</html>

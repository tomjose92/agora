# Desktop release pipeline, gated on the version bump: merge a PR to main
# that bumps `version` in crates/agora-desktop/tauri.conf.json (plus the
# workspace version in Cargo.toml) and this builds the macOS app (universal:
# Apple Silicon + Intel), produces the DMG + signed updater artifacts + the
# latest.json feed, and publishes a GitHub Release named after that version.
# Publishing creates the vX.Y.Z tag and the app's updater (which polls
# releases/latest/download/latest.json and only sees published releases)
# picks it up immediately — merging the bump *is* shipping.
#
# Merges that touch desktop code *without* a bump build nothing on purpose:
# the bump is the publish intent. If the version's release already exists
# (draft or published), the run is a no-op, so re-touching tauri.conf.json
# never double-releases.
#
# Required repository secret (Settings → Secrets and variables → Actions):
# - TAURI_SIGNING_PRIVATE_KEY: contents of ~/.tauri/agora_updater.key
#   (signs updater artifacts; the matching pubkey is in tauri.conf.json).
#
# Apple signing/notarization secrets (required — the build signs with the
# Developer ID cert and notarizes the app so downloads pass Gatekeeper):
# - APPLE_CERTIFICATE: base64 of the Developer ID Application .p12
# - APPLE_CERTIFICATE_PASSWORD: password for that .p12
# - APPLE_SIGNING_IDENTITY: e.g. "Developer ID Application: Tom Jose (TEAM)"
# - APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID: notarytool credentials
#   (APPLE_PASSWORD is an app-specific password for the Apple ID)

name: Release desktop app

on:
  push:
    branches: [main]
    paths:
      - "crates/agora-desktop/tauri.conf.json"
  # Manual escape hatch: re-run a release for the version currently on main
  # (e.g. after a failed build) without another commit.
  workflow_dispatch: {}

permissions:
  contents: write

# A burst of merges queues up rather than racing two builds.
concurrency:
  group: release-desktop
  cancel-in-progress: false

jobs:
  # Publish only when the version on main doesn't have a release yet — the
  # merge that bumps tauri.conf.json is the trigger; anything else no-ops.
  gate:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.check.outputs.publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip if this version is already released
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('crates/agora-desktop/tauri.conf.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists — nothing to do."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing release v$VERSION."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    needs: gate
    if: needs.gate.outputs.publish == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # The web UI deps: tauri's beforeBuildCommand runs `npm run build`
      # (web/ -> web/dist), which frontendDist and the bundle resources copy.
      - run: npm ci

      - name: Build, sign and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signing (required).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Apple code signing + notarization. APPLE_SIGNING_IDENTITY overrides
          # the dev identity in tauri.conf.json; the cert is imported into a
          # temporary keychain by tauri-action.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/agora-desktop
          tagName: v${{ needs.gate.outputs.version }}
          releaseName: "Agora v${{ needs.gate.outputs.version }}"
          releaseBody: "See the commit history for changes."
          releaseDraft: false
          args: --target universal-apple-darwin

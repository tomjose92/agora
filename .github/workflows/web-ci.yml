# CI for the JS stack (packages/core + web) and the committed UI build.
#
# Three guarantees on every PR that touches the web code:
#   1. checks   — typecheck + @agora/core unit tests (incl. mdlite byte-parity
#                 with the vanilla UI and the three-way emoji sync).
#   2. drift    — `npm run build` and `node scripts/gen-emoji.js` reproduce
#                 the committed ui/app2/, ui/index.html, and emoji datasets
#                 byte-for-byte. Editing web/ or packages/core without
#                 rebuilding (or hand-editing generated files) fails here.
#   3. parity   — the Playwright suite (web/e2e/parity.mjs) drives every core
#                 flow against a real agora-server, on both the React app at
#                 "/" and the legacy vanilla UI at "/vanilla/".
#
# mobile/ is intentionally not covered: it is not an npm-workspace member
# and has its own pipeline (publish-mobile.yml).

name: Web CI

on:
  pull_request:
    paths:
      - "web/**"
      - "packages/**"
      - "ui/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/gen-emoji.js"
      - ".github/workflows/web-ci.yml"
  push:
    branches: [main]
    paths:
      - "web/**"
      - "packages/**"
      - "ui/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/gen-emoji.js"
      - ".github/workflows/web-ci.yml"

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Typecheck (packages/core + web)
        run: npm run typecheck
      - name: Unit tests (@agora/core)
        run: npm test
      - name: Rebuild generated files and check for drift
        run: |
          npm run build
          node scripts/gen-emoji.js
          # ui/app2, ui/index.html, and the emoji datasets are generated —
          # a diff here means a PR changed sources without rebuilding, or
          # hand-edited a generated file.
          git diff --exit-code -- ui/app2 ui/index.html ui/emoji.js \
            mobile/src/lib/emoji.ts packages/core/src/lib/emoji.ts \
            || { echo "::error::Generated files are stale — run 'npm run build' and 'node scripts/gen-emoji.js' and commit the result."; exit 1; }

  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Only agora-server is built; keep the cache scoped to it.
          shared-key: web-ci-server
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build agora-server
        run: cargo build -p agora-server
      - name: Parity suite — React app at /
        run: |
          rm -rf /tmp/agora-parity
          ./target/debug/agora-server --data-dir /tmp/agora-parity --ui-dir ui &
          SERVER_PID=$!
          for i in $(seq 1 50); do [ -f /tmp/agora-parity/config.json ] && break; sleep 0.2; done
          export AGORA_TOKEN=$(node -e "console.log(require('/tmp/agora-parity/config.json').admin_key)")
          node web/e2e/parity.mjs /
          kill $SERVER_PID
      - name: Parity suite — legacy vanilla UI at /vanilla/
        run: |
          rm -rf /tmp/agora-parity
          ./target/debug/agora-server --data-dir /tmp/agora-parity --ui-dir ui &
          SERVER_PID=$!
          for i in $(seq 1 50); do [ -f /tmp/agora-parity/config.json ] && break; sleep 0.2; done
          export AGORA_TOKEN=$(node -e "console.log(require('/tmp/agora-parity/config.json').admin_key)")
          node web/e2e/parity.mjs /vanilla/
          kill $SERVER_PID

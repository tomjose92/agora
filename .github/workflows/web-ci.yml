# CI for the JS stack (packages/core + web).
#
# Guarantees on every PR that touches the web code:
#   1. checks  — typecheck + @agora/core unit tests, a web build (web/dist is
#                gitignored — nothing generated is committed), and a drift
#                check that scripts/gen-emoji.js reproduces the committed
#                packages/core emoji dataset.
#   2. mobile  — mobile/ consumes @agora/core via a file: dependency, so a
#                core change can break it: standalone npm ci + tsc + jest.
#                (Publishing stays in publish-mobile.yml.)
#   3. parity  — the Playwright suite (web/e2e/parity.mjs) drives every core
#                flow against a real agora-server serving the fresh web/dist
#                build.

name: Web CI

on:
  pull_request:
    paths:
      - "web/**"
      - "packages/**"
      - "mobile/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/gen-emoji.js"
      - ".github/workflows/web-ci.yml"
  push:
    branches: [main]
    paths:
      - "web/**"
      - "packages/**"
      - "mobile/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/gen-emoji.js"
      - ".github/workflows/web-ci.yml"

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Typecheck (packages/core + web)
        run: npm run typecheck
      - name: Unit tests (@agora/core)
        run: npm test
      - name: Web build succeeds (web/dist is gitignored, never committed)
        run: npm run build
      - name: Emoji dataset drift check
        run: |
          node scripts/gen-emoji.js
          git diff --exit-code -- packages/core/src/lib/emoji.ts \
            || { echo "::error::packages/core/src/lib/emoji.ts is stale — run 'node scripts/gen-emoji.js' and commit the result."; exit 1; }

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mobile/package-lock.json
      # Root install first: mobile consumes @agora/core as shipped TS source
      # through a file: dep, and the package's react types + babel helpers
      # resolve from the repo root's node_modules.
      - run: npm ci
      - run: npm ci
        working-directory: mobile
      - run: npx tsc --noEmit
        working-directory: mobile
      - run: npx jest --silent
        working-directory: mobile

  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Only agora-server is built; keep the cache scoped to it.
          shared-key: web-ci-server
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build web UI
        run: npm run build
      - name: Build agora-server
        run: cargo build -p agora-server
      - name: Parity suite
        run: |
          rm -rf /tmp/agora-parity
          ./target/debug/agora-server --data-dir /tmp/agora-parity --ui-dir web/dist &
          SERVER_PID=$!
          for i in $(seq 1 50); do [ -f /tmp/agora-parity/config.json ] && break; sleep 0.2; done
          export AGORA_TOKEN=$(node -e "console.log(require('/tmp/agora-parity/config.json').admin_key)")
          node web/e2e/parity.mjs /
          kill $SERVER_PID
